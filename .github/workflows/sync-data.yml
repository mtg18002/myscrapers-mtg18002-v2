name: Data Sync Hourly Predictions to Repo
run-name: Syncing hourly predictions for ${{ github.ref_name }} by @${{ github.actor }} 
on:
  schedule:
    - cron: '45 * * * *' # Every hour at 45 minutes past the hour
  workflow_dispatch: 

permissions:
  contents: write # REQUIRED to commit and push files
  id-token: write # REQUIRED for Workload Identity Federation (WIF)

# Inherit variables from your existing setup
env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  BUCKET_NAME: ${{ vars.BUCKET_NAME }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
  DEPLOYER_SA: ${{ vars.DEPLOYER_SA }}
  GCS_PREDS_PREFIX: "structured/preds-autoML" # Base path for your prediction folders
  OUTPUT_DIR: "results" # Local folder to store all timestamped files

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      # --- 1. SETUP & AUTHENTICATION ---
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # FIX: Explicitly grant the GITHUB_TOKEN write access for push/rebase
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auth (WIF) and Setup gcloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}
      
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # --- 2. COPY preds-autoML Folder ---
      - name: Copy preds-autoML Folder
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ${{ env.OUTPUT_DIR }}
          
          echo "Copying all files from gs://${BUCKET_NAME}/${GCS_PREDS_PREFIX}/ to local folder..."
          gsutil -m cp -r gs://${BUCKET_NAME}/${GCS_PREDS_PREFIX} ${{ env.OUTPUT_DIR }}/
          echo "Copy completed."

      # --- 3. COMMIT AND PUSH ---
      - name: Commit and Push preds-autoML Folder
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          echo "Staging all files in ${{ env.OUTPUT_DIR }}..."
          git add ${{ env.OUTPUT_DIR }}

          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Data Sync: Update entire preds-autoML folder"
            git pull --rebase origin main
            git push
            echo "Push completed."
          else
            echo "No changes detected, skipping commit."
          fi
